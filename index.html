<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小森林記帳本 🌿</title>
    <style>
        :root {
            --bg: #F3F8F2;
            --primary: #7BAE7F;
            --dark: #4A6D4C;
            --card: #FFFFFF;
            --text: #2F3E30;
            --accent: #E9F0E8;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: env(safe-area-inset-top) 15px 80px 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header */
        header { text-align: center; margin: 20px 0; }
        #clock { font-size: 0.85rem; color: var(--dark); opacity: 0.8; margin-top: 5px; }
        h1 { margin: 0; font-size: 1.4rem; letter-spacing: 2px; color: var(--dark); }

        /* Tabs */
        .tab-box {
            display: flex; background: var(--accent); border-radius: 30px;
            padding: 5px; width: 100%; max-width: 320px; margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; border: none; padding: 12px; border-radius: 25px;
            background: none; cursor: pointer; font-weight: bold; color: #888;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(123, 174, 127, 0.3); }

        /* Summary Card */
        .summary-card {
            background: var(--card); width: 90%; max-width: 320px;
            padding: 20px; border-radius: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid white;
        }
        .summary-label { font-size: 0.8rem; color: #999; margin-bottom: 5px; }
        .summary-total { font-size: 1.8rem; font-weight: bold; color: var(--dark); }

        /* Category Accordion */
        .cate-group { width: 100%; max-width: 350px; margin-bottom: 10px; }
        .cate-header {
            background: var(--card); padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .cate-header::before { content: "🍃"; margin-right: 8px; }
        .cate-content { display: none; padding: 10px 5px; }
        .cate-content.active { display: block; }

        /* Item Style */
        .item {
            background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; font-size: 0.9rem;
            border-left: 4px solid var(--primary);
        }
        .item-info span { display: block; font-size: 0.75rem; color: #999; }

        /* Float Button */
        .add-btn {
            position: fixed; bottom: 30px; right: 25px;
            width: 55px; height: 55px; background: var(--dark);
            border-radius: 50%; color: white; font-size: 28px;
            border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }

        /* Modal Form */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-body {
            background: white; width: 85%; max-width: 320px; padding: 25px;
            border-radius: 25px; position: relative;
        }
        input, select {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #EEE;
            border-radius: 10px; box-sizing: border-box; outline: none;
        }
        .submit-btn {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>小森林記帳 🌿</h1>
    <div id="clock">正在讀取時間...</div>
</header>

<div class="tab-box">
    <button id="btn-merch" class="tab-btn active" onclick="showPage('merch')">週邊物</button>
    <button id="btn-topup" class="tab-btn" onclick="showPage('topup')">課金命</button>
</div>

<div id="page-merch" class="page">
    <div class="summary-card">
        <div class="summary-label">週邊預算總支出 (TWD)</div>
        <div class="summary-total">NT$ <span id="total-merch">0</span></div>
        <div style="font-size: 0.7rem; color: #BBB; margin-top:10px;">
            當前設定匯率：<input type="number" id="manual-rate" value="4.5" style="width:40px; padding:2px; margin:0;" onchange="updateAllPrices()">
        </div>
    </div>
    <div id="list-merch"></div>
</div>

<div id="page-topup" class="page hidden">
    <div class="summary-card">
        <div class="summary-label">各遊戲總課金 (TWD)</div>
        <div class="summary-total">NT$ <span id="total-topup">0</span></div>
    </div>
    <div id="list-topup"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div id="modal" onclick="closeModal(event)">
    <div class="modal-body" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; color:var(--dark)">新增紀錄 🍃</h3>
        <select id="form-type" onchange="toggleFormFields()">
            <option value="Merch">週邊物</option>
            <option value="TopUp">課金</option>
        </select>
        <input type="text" id="form-name" placeholder="名稱 (例如：立牌 / 640石)">
        <input type="text" id="form-cate" placeholder="作品或遊戲名稱 (大分類)">
        
        <div id="merch-fields">
            <input type="number" id="form-cny" placeholder="人民幣金額" oninput="autoConvert()">
            <input type="number" id="form-twd" placeholder="換算台幣 (自動)">
            <input type="number" id="form-ship" placeholder="運費 (台幣)">
            <input type="text" id="form-tag" placeholder="標籤 (例如：預售 / 現貨)">
            <select id="form-status">
                <option value="未付款">未付款</option>
                <option value="訂金">訂金</option>
                <option value="已付款">已付款</option>
                <option value="已收到">已收到</option>
            </select>
        </div>

        <div id="topup-fields" class="hidden">
            <input type="number" id="form-amount" placeholder="課金台幣金額">
        </div>

        <button class="submit-btn" onclick="submitData()">確認存入森林 💾</button>
    </div>
</div>

<script>
    // ⚠️ 請修改為你的 Google Apps Script 部署網址
    const API_URL = "https://script.google.com/macros/s/AKfycbzJsYDgrn6_ygBB8NhMcSPkj7nXrJstwernC87coxEWkmsUSsgpbvxJyy1jX-WmMX_2/exec"; 

    let currentTab = 'merch';

    // 1. 時間顯示
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleString('zh-TW', { 
            year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' 
        });
    }
    setInterval(updateClock, 1000);

    // 2. 切換分頁
    function showPage(type) {
        currentTab = type;
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + type).classList.remove('hidden');
        document.getElementById('btn-' + type).classList.add('active');
    }

    // 3. 展開收起
    function toggleCate(el) {
        el.nextElementSibling.classList.toggle('active');
    }

    // 4. 彈窗控制
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal(e) { document.getElementById('modal').style.display = 'none'; }
    
    function toggleFormFields() {
        const type = document.getElementById('form-type').value;
        document.getElementById('merch-fields').classList.toggle('hidden', type !== 'Merch');
        document.getElementById('topup-fields').classList.toggle('hidden', type !== 'TopUp');
    }

    function autoConvert() {
        const cny = document.getElementById('form-cny').value;
        const rate = document.getElementById('manual-rate').value;
        document.getElementById('form-twd').value = Math.round(cny * rate);
    }

    // 5. 送出資料
    async function submitData() {
        const type = document.getElementById('form-type').value;
        const btn = document.querySelector('.submit-btn');
        btn.innerText = "傳送中...";
        
        let payload = { type: type };
        if (type === 'Merch') {
            payload.name = document.getElementById('form-name').value;
            payload.cny = document.getElementById('form-cny').value;
            payload.twd = document.getElementById('form-twd').value;
            payload.status = document.getElementById('form-status').value;
            payload.shipping = document.getElementById('form-ship').value || 0;
            payload.category = document.getElementById('form-cate').value;
            payload.tag = document.getElementById('form-tag').value;
        } else {
            payload.name = document.getElementById('form-name').value;
            payload.amount = document.getElementById('form-amount').value;
            payload.game = document.getElementById('form-cate').value;
        }

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("成功存入試算表！🌿");
            location.reload(); // 重新整理讀取新資料
        } catch (e) {
            alert("失敗了，請檢查網址或網路");
            btn.innerText = "確認存入森林 💾";
        }
    }

    window.onload = updateClock;
</script>
</body>
</html>
</html>
